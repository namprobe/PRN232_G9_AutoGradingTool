# PRN232 G9 — full stack (Postgres, Redis, API, FE nginx, pgAdmin)
#
# Chuẩn bị: copy .env.example → .env và chỉnh mật khẩu/JWT (ConnectionStrings phải Host=postgres khi chạy compose).
#
# Sau khi có code mới:
#   docker compose build --no-cache autogradingtool-api autogradingtool-frontend
#   docker compose up -d
#
# Swagger API trực tiếp: http://localhost:${API_PORT:-5000}/swagger
# UI (qua nginx, /api proxy sang API): http://localhost:${FRONTEND_PORT:-5173}/

services:
  postgres:
    image: postgres:15-alpine
    container_name: autogradingtool-postgres
    env_file:
      # Load environment variables from .env file
      # You can override values by:
      # 1. Setting shell environment variables before running docker-compose
      # 2. Creating .env.local or .env.docker files (optional, only if needed)
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./docker/init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - autogradingtool-network

  redis:
    image: redis:7-alpine
    container_name: autogradingtool-redis
    env_file:
      - .env
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$$REDIS_PASSWORD\"
      else
        redis-server
      fi
      "
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: >
        sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-cli -a \"$$REDIS_PASSWORD\" ping || exit 1
        else
          redis-cli ping || exit 1
        fi
        "
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autogradingtool-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: autogradingtool-pgadmin
    env_file:
      - .env
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autogradingtool-network

  # FE: container riêng, cùng stack/network; /api được nginx proxy sang autogradingtool-api
  autogradingtool-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Rỗng = browser gọi /api/... cùng origin, nginx proxy sang service API
        VITE_API_BASE_URL: ""
    container_name: autogradingtool-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      autogradingtool-api:
        condition: service_healthy
    networks:
      - autogradingtool-network

  autogradingtool-api:
    build:
      context: .
      dockerfile: ./src/PRN232_G9_AutoGradingTool.API/Dockerfile
      # No build args needed - Resources are handled in Dockerfile
      # The Dockerfile creates a timestamp marker file on every build,
      # ensuring Resources files are always fresh (no cache)
    container_name: autogradingtool-api
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      # entrypoint.sh chờ DB (mặc định hostname service trong compose)
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      # Zip nộp bài có thể > 50MB; ghi đè .env cũ nếu cần
      - FileStorage__MaxFileSizeBytes=${FILESTORAGE_MAX_BYTES:-209715200}
    ports:
      - "${API_PORT:-5000}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 90s
    volumes:
      # Persist logs directory - application logs will not be lost on rebuild
      # Mounted to logs_data named volume at runtime
      - logs_data:/app/Logs
      # Persist uploads directory - files will not be lost on rebuild
      # Host directory ./uploads maps to /app/wwwroot/uploads in container
      - ./uploads:/app/wwwroot/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - autogradingtool-network

volumes:
  postgres_data:
  redis_data:
  logs_data:

networks:
  autogradingtool-network:
    driver: bridge
